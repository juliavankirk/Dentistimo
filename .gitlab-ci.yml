image: docker

services:
  - docker:dind

stages:
  - prebuild
  - deploy

prebuild:
  stage: prebuild
 
  script:
  - docker info
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY



deploy:
  stage: deploy
  only:
    - production
  script:
    
    - docker-compose build
    - docker-compose up -d
  